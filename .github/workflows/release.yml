name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/se2eend/se2eend-backend
  FRONTEND_IMAGE: ghcr.io/se2eend/se2eend-frontend

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        working-directory: ./backend
        run: mvn clean install

  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend/core
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: 'npm'
          cache-dependency-path: frontend/core/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          VITE_KEYCLOAK_URL: http://localhost:8090
          VITE_KEYCLOAK_REALM: se2eend
          VITE_KEYCLOAK_CLIENT_ID: se2eend-frontend

  publish-backend:
    needs: [backend-test, frontend-check]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.version.outputs.VERSION }}
            ${{ env.BACKEND_IMAGE }}:latest

  publish-frontend:
    needs: [backend-test, frontend-check]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend/core
          push: true
          build-args: |
            VITE_KEYCLOAK_URL=http://localhost:8090
            VITE_KEYCLOAK_REALM=se2eend
            VITE_KEYCLOAK_CLIENT_ID=se2eend-frontend
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.version.outputs.VERSION }}
            ${{ env.FRONTEND_IMAGE }}:latest

  publish-frontend-static:
    needs: [backend-test, frontend-check]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend/core

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: 'npm'
          cache-dependency-path: frontend/core/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
        working-directory: .

      - name: Package dist
        run: zip -r ../../frontend-${{ steps.version.outputs.VERSION }}.zip dist/

      - name: Upload static artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-static
          path: frontend-${{ steps.version.outputs.VERSION }}.zip

  github-release:
    needs: [publish-backend, publish-frontend, publish-frontend-static]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download static frontend artifact
        uses: actions/download-artifact@v8
        with:
          name: frontend-static

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: sE2EEnd ${{ steps.version.outputs.VERSION }}
          files: frontend-${{ steps.version.outputs.VERSION }}.zip
          body: |
            ## Docker Images

            ```bash
            docker pull ${{ env.BACKEND_IMAGE }}:${{ steps.version.outputs.VERSION }}
            docker pull ${{ env.FRONTEND_IMAGE }}:${{ steps.version.outputs.VERSION }}
            ```

            ## Static Frontend (shared hosting)

            Download `frontend-${{ steps.version.outputs.VERSION }}.zip`, extract it, edit `config.js` to point to your backend, then upload the contents to your web server.

            ## Quick Start

            See the [README](https://github.com/sE2EEnd/sE2EEnd#readme) for setup instructions.
          generate_release_notes: true