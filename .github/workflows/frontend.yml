name: Frontend CI

on:
  push:
    branches:
      - 'main'
    paths:
      - 'frontend/**'
  pull_request:
    branches:
      - 'main'
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  build-check:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend/core

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: 'npm'
          cache-dependency-path: frontend/core/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          VITE_KEYCLOAK_URL: http://localhost:8090
          VITE_KEYCLOAK_REALM: se2eend
          VITE_KEYCLOAK_CLIENT_ID: se2eend-frontend

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Snyk — dependency scan
        run: snyk test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk — static analysis (SAST)
        run: snyk code test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk — monitor (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: snyk monitor
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true
