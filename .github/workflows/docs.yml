name: Docs CI

on:
  push:
    branches:
      - main
    paths:
      - 'docs/user-guide/**'
  pull_request:
    branches:
      - main
    paths:
      - 'docs/user-guide/**'

jobs:
  build-check:
    runs-on: ubuntu-latest
    container: pandoc/extra:latest

    steps:
      - uses: actions/checkout@v5

      - name: Install bash
        run: apk add --no-cache bash

      - name: Build PDFs
        run: bash docs/user-guide/build.sh

      - name: Upload PDFs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: user-guide-pdfs-preview
          path: |
            frontend/core/public/guide-en.pdf
            frontend/core/public/guide-fr.pdf
          retention-days: 7
